# Developer-only overrides. Activate with:
#   ./gradlew bootRun --args='--spring.profiles.active=dev'
#
# Enables the H2 web console at http://localhost:3000/h2-console
# (JDBC URL: jdbc:h2:file:./data/testdb, user: sa, no password).
# SecurityConfig only permits the console path when this profile is active.
spring.h2.console.enabled=true

# Verbose logging is convenient locally but must stay out of the default profile.
logging.level.org.springframework.security=DEBUG
