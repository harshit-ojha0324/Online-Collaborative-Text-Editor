spring.application.name=backend
server.port=3000

# --- Datasource (local H2 file DB) ---
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:h2:file:./data/testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# The H2 web console is DISABLED by default. It is enabled only under the "dev"
# profile (see application-dev.properties) and is never permitted in production.
# Run locally with:  ./gradlew bootRun --args='--spring.profiles.active=dev'
spring.h2.console.enabled=false

# --- Logging (avoid dumping auth headers / full SQL in production) ---
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN

# --- Security ---
# JWT signing secret. Provide it via the JWT_SECRET_KEY environment variable
# (Base64-encoded, at least 256 bits). Never commit a real secret to source control.
# Generate one with:  openssl rand -base64 48
jwt.secret-key=${JWT_SECRET_KEY:}
